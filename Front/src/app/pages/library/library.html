<div class="library-page">
  <div class="library-header">
    <div class="header-inner">
      <h1>📚 Все книги</h1>
      <div class="library-controls">
        <div class="sort-controls"></div>
      </div>
    </div>
  </div>
  <div class="status-row">
    <div class="status-badge" *ngIf="statusMessage">
      <span class="badge-icon">📚</span>
      <span class="badge-text">{{ statusMessage }}</span>
    </div>
  </div>

  <div class="library-content">
    <aside class="sidebar library-sidebar">
      <div class="sidebar-nav">
        <h3>🎛️ Фильтры</h3>
        <div class="filters">
          <label
            ><input
              type="checkbox"
              [checked]="showOnlyWithText"
              (change)="toggleTextOnly($event)"
            />
            Доступны онлайн</label
          >
          <label
            ><input type="checkbox" [checked]="showOnlyWithCover" (change)="toggleCover($event)" />
            С обложкой</label
          >
          <div class="genre-filters" *ngIf="genres && genres.length">
            <h4>Жанры</h4>
            <div *ngFor="let g of genres">
              <label>
                <input
                  type="checkbox"
                  [checked]="selectedGenres.has(g)"
                  (change)="toggleGenre(g, $event)"
                />
                {{ g }}
              </label>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <div class="books-main">
      <div class="books-grid">
        <ng-container *ngIf="loading">
          <div class="book-card placeholder" *ngFor="let n of [1, 2, 3, 4, 5, 6]"></div>
        </ng-container>
        <div class="book-card" *ngFor="let book of books">
          <div class="book-cover">
            <!-- show actual coverUrl in tooltip to help debugging -->
            <img
              *ngIf="book.coverUrl && !book._coverFailed; else placeholder"
              [src]="book.coverUrl"
              [title]="book.coverUrl || book['coverURL'] || book['cover_url'] || ''"
              alt="cover"
              (error)="onCoverError(book, $event)"
            />
            <ng-template #placeholder>
              <div class="cover-placeholder">📚</div>
            </ng-template>
          </div>
          <div class="book-info">
            <h3 class="book-title">
              {{ book.localizedTitle || book.title }}
              <small class="source" *ngIf="book.source && book.source !== 'local'">{{
                book.source
              }}</small>
            </h3>
            <div class="badges">
              <span *ngIf="book.source === 'gutendex'" class="badge">RU</span>
              <span *ngIf="book.readUrl" class="badge available">Текст</span>
            </div>
            <p class="book-author">{{ book.authors?.join(', ') || book.author || '' }}</p>
            <div class="book-meta">
              <span class="book-genre">{{ book.genre || '' }}</span>
            </div>
            <div class="book-actions">
              <button class="read-btn" (click)="openReader(book)">Читать</button>
              <button
                class="fav-btn"
                [class.active]="isFavorite(book)"
                (click)="addToFavorites(book)"
              >
                <span class="heart">♥</span>
                <span class="label">{{ isFavorite(book) ? 'В избранном' : 'В избранное' }}</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div *ngIf="!loading && books.length === 0" class="empty-msg">Ничего не найдено.</div>
      <div *ngIf="error" class="error-msg">{{ error }}</div>
    </div>
  </div>
  <app-book-reader
    *ngIf="readerUrl || readerText"
    [readUrl]="readerUrl"
    [title]="readerTitle"
    [text]="readerText"
    (closed)="closeReader()"
  ></app-book-reader>
</div>
