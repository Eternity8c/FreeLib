<div class="favorites-page">
  <div class="library-header">
    <div class="header-inner">
      <h1>⭐ Избранное</h1>
    </div>
  </div>

  <div class="status-row">
    <div class="status-badge" *ngIf="message">
      <span class="badge-icon">⭐</span>
      <span class="badge-text">{{ message }}</span>
    </div>
  </div>

  <div class="books-main">
    <div class="books-grid">
      <ng-container *ngIf="loading">
        <div class="book-card placeholder" *ngFor="let n of [1, 2, 3, 4]"></div>
      </ng-container>

      <div class="book-card" *ngFor="let book of books">
        <div class="book-cover">
          <img *ngIf="book.coverUrl; else placeholder" [src]="book.coverUrl" alt="cover" />
          <ng-template #placeholder>
            <div class="cover-placeholder">📚</div>
          </ng-template>
        </div>
        <div class="book-info">
          <h3 class="book-title">
            {{ book.localizedTitle || book.title }}
            <small class="source" *ngIf="book.source && book.source !== 'local'">{{
              book.source
            }}</small>
          </h3>
          <div class="badges">
            <span *ngIf="book.source === 'gutendex'" class="badge">RU</span>
            <span *ngIf="book.readUrl || book._sampleText" class="badge available">Текст</span>
          </div>
          <p class="book-author">{{ book.authors?.join(', ') || book.author || '' }}</p>
          <div class="book-meta">
            <span class="book-genre">{{ book.genre || '' }}</span>
          </div>
          <div class="book-actions">
            <button class="read-btn" (click)="openReader(book)">Читать</button>
            <button class="fav-btn active" (click)="removeFromFavorites(book)">
              <span class="heart">♥</span>
              <span class="label">Удалить</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <app-book-reader
    *ngIf="readerUrl || readerText"
    [readUrl]="readerUrl"
    [title]="readerTitle"
    [text]="readerText"
    (closed)="closeReader()"
  ></app-book-reader>
</div>
