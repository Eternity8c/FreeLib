<div class="modal-overlay" (click)="closeModal()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="closeModal()">×</button>

    <div class="auth-tabs">
      <button class="tab-btn" [class.active]="isLoginMode" (click)="isLoginMode = true">
        Вход
      </button>
      <button class="tab-btn" [class.active]="!isLoginMode" (click)="isLoginMode = false">
        Регистрация
      </button>
    </div>

    <form *ngIf="isLoginMode" (ngSubmit)="onLogin()" class="auth-form">
      <h3>Вход в аккаунт</h3>

      <input type="email" placeholder="Email" [(ngModel)]="loginData.email" name="email" required />

      <input
        type="password"
        placeholder="Пароль"
        [(ngModel)]="loginData.password"
        name="password"
        required
      />

      <button type="submit" class="submit-btn">Войти</button>
    </form>

    <form *ngIf="!isLoginMode" (ngSubmit)="onRegister()" class="auth-form">
      <h3>Регистрация</h3>

      <input
        type="text"
        placeholder="Имя пользователя"
        [(ngModel)]="registerData.username"
        name="username"
        required
      />

      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="registerData.email"
        name="email"
        required
      />

      <input
        type="password"
        placeholder="Пароль"
        [(ngModel)]="registerData.password"
        name="password"
        required
      />

      <input
        type="password"
        placeholder="Подтвердите пароль"
        [(ngModel)]="registerData.confirmPassword"
        name="confirmPassword"
        required
      />

      <button type="submit" class="submit-btn">Зарегистрироваться</button>
    </form>
  </div>
</div>
